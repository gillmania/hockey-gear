# CI för mobilappen: typkontroll, lint och tester på varje push/PR.
# EAS-byggen körs INTE här – de startas manuellt med `eas build`
# (se docs/RELEASE-GUIDE.md).

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit
      - run: npx eslint .
      - run: npx jest --ci
